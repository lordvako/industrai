<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Оплата成功 — IndustrAI</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #00B4A0 0%, #008A7A 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .success-card {
            background: white;
            border-radius: 32px;
            padding: 48px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .checkmark {
            width: 80px;
            height: 80px;
            background: #00B4A0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }
        .checkmark svg {
            width: 48px;
            height: 48px;
            color: white;
        }
        h1 { color: #1a2a3a; margin-bottom: 16px; }
        p { color: #5A6B7A; line-height: 1.6; margin-bottom: 32px; }
        .btn {
            background: #00B4A0;
            color: white;
            padding: 14px 28px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="checkmark">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>
        <h1>✅ Оплата прошла успешно!</h1>
        <p>Ваш аккаунт активирован. На указанную почту отправлены данные для входа.<br><br>
        Если письмо не пришло в течение 5 минут — проверьте папку «Спам».</p>
        <a href="login.html" class="btn">Войти в личный кабинет →</a>
    </div>
</body>
</html>
