<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата подписки IndustrAI</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f5f8fc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .payment-card {
            background: white;
            border-radius: 24px;
            padding: 32px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        h1 {
            color: #1a2a3a;
            font-size: 28px;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #5A6B7A;
            margin-bottom: 32px;
        }
        .price {
            font-size: 48px;
            font-weight: 700;
            color: #00B4A0;
            margin: 20px 0;
        }
        .price small {
            font-size: 16px;
            color: #5A6B7A;
        }
        .plan-name {
            background: #f0f7ff;
            padding: 8px 16px;
            border-radius: 20px;
            display: inline-block;
            font-size: 14px;
            font-weight: 600;
            color: #2B6FF0;
            margin-bottom: 16px;
        }
        .plan-details {
            background: #f8fafc;
            border-radius: 16px;
            padding: 20px;
            margin: 20px 0;
        }
        .plan-details ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .plan-details li {
            margin: 12px 0;
            color: #2c3e50;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .plan-details li:before {
            content: "✅";
            color: #00B4A0;
        }
        .payment-methods {
            display: flex;
            gap: 16px;
            margin: 24px 0;
            justify-content: center;
        }
        .method {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 12px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            transition: all 0.2s;
        }
        .method.selected {
            border-color: #00B4A0;
            background: #f0fff8;
        }
        .method span {
            font-size: 14px;
            font-weight: 500;
        }
        .pay-button {
            background: #00B4A0;
            color: white;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 20px;
        }
        .pay-button:hover {
            background: #009688;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: #5A6B7A;
            text-decoration: none;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #5A6B7A;
        }
    </style>
</head>
<body>
    <div class="payment-card" id="paymentCard">
        <div class="loading">Загрузка...</div>
    </div>
    
    <script>
        // Получаем параметры из URL
        const urlParams = new URLSearchParams(window.location.search);
        const planType = urlParams.get('plan') || 'pro';
        const planName = decodeURIComponent(urlParams.get('name') || 'Профессиональный');
        const planPrice = parseInt(urlParams.get('price') || '1990');
        
        // Данные тарифов для отображения
        const plansDetails = {
            basic: {
                features: [
                    "50 запросов к нейросети в день",
                    "Доступ к базе знаний (форумы)",
                    "Базовая поддержка",
                    "Обновления ПО"
                ]
            },
            pro: {
                features: [
                    "Неограниченные запросы к нейросети",
                    "Полный доступ к базе знаний",
                    "Приоритетная поддержка",
                    "Обновления ПО",
                    "Экспорт диалогов"
                ]
            },
            business: {
                features: [
                    "Всё что в PRO",
                    "API доступ",
                    "Интеграция с вашими системами",
                    "VIP поддержка 24/7",
                    "Персональный менеджер"
                ]
            }
        };
        
        const features = plansDetails[planType]?.features || plansDetails.pro.features;
        
        // Формируем данные для ЮMoney
        // !!! ЗАМЕНИТЕ НОМЕР КОШЕЛЬКА НА ВАШ !!!
        const YOOMONEY_WALLET = "410012513730399";  // ЗАМЕНИТЕ НА ВАШ НОМЕР КОШЕЛЬКА
        const SITE_URL = "https://industrai.ru";      // ЗАМЕНИТЕ НА ВАШ URL
        
        // Генерируем уникальный ID заказа
        const orderId = 'ORDER_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
        
        // Отображаем страницу оплаты
        document.getElementById('paymentCard').innerHTML = `
            <h1>💎 ${planName}</h1>
            <div class="plan-name">${planType === 'basic' ? 'Базовый' : planType === 'pro' ? 'Профессиональный' : 'Бизнес'}</div>
            <div class="price">
                ₽${planPrice.toLocaleString()} <small>/ месяц</small>
            </div>
            
            <div class="plan-details">
                <ul>
                    ${features.map(f => `<li>${f}</li>`).join('')}
                </ul>
            </div>
            
            <div class="payment-methods">
                <div class="method selected" data-type="PC" onclick="selectMethod('PC')">
                    <span>💳 ЮMoney</span>
                </div>
                <div class="method" data-type="AC" onclick="selectMethod('AC')">
                    <span>💳 Банковская карта</span>
                </div>
            </div>
            
            <form id="paymentForm" method="POST" action="https://yoomoney.ru/quickpay/confirm" target="_blank">
                <input type="hidden" name="receiver" value="${YOOMONEY_WALLET}">
                <input type="hidden" name="quickpay-form" value="button">
                <input type="hidden" name="sum" value="${planPrice}">
                <input type="hidden" name="paymentType" id="paymentType" value="PC">
                <input type="hidden" name="label" value="${orderId}">
                <input type="hidden" name="successURL" value="${SITE_URL}/success.html?plan=${planType}&order=${orderId}">
                
                <button type="submit" class="pay-button">Оплатить ₽${planPrice.toLocaleString()}</button>
            </form>
            
            <div class="back-link">
                <a href="javascript:history.back()">← Вернуться назад</a>
            </div>
        `;
        
        function selectMethod(type) {
            document.querySelectorAll('.method').forEach(el => el.classList.remove('selected'));
            document.querySelector(`.method[data-type="${type}"]`).classList.add('selected');
            document.getElementById('paymentType').value = type;
        }
    </script>
</body>
</html>
